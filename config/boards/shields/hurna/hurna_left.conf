CONFIG_ZMK_KEYBOARD_NAME="Hurna"

CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=18000000

CONFIG_ZMK_POINTING=y

# Enable BLE and BLE split transport
CONFIG_ZMK_BLE=y
CONFIG_ZMK_SPLIT_BLE=y
CONFIG_ZMK_SPLIT_WIRED=n

# Battery reporting (if the half has a battery)
CONFIG_ZMK_BATTERY_REPORTING=y

# System
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
