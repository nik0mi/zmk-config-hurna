CONFIG_ZMK_KEYBOARD_NAME="Hurna"

CONFIG_ZMK_SLEEP=n
CONFIG_ZMK_POINTING=y

# Enable BLE and BLE split transport (ESB disabled)
CONFIG_ZMK_BLE=y
CONFIG_ZMK_SPLIT_BLE=y
CONFIG_ZMK_SPLIT_WIRED=n
# No ESB
# CONFIG_ZMK_SPLIT_ESB is not set

# Central counts peripherals for battery reporting
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=2
CONFIG_BT_MAX_PAIRED=2

# Battery reporting (valid for BLE split)
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

# System / Bluetooth stack
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Display
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_BLANK_ON_IDLE=y
CONFIG_LV_Z_VDB_SIZE=32
CONFIG_ZMK_DONGLE_DISPLAY_DONGLE_BATTERY=y
CONFIG_ZMK_DONGLE_DISPLAY_LAYER=n
CONFIG_ZMK_DONGLE_DISPLAY_BONGO_CAT=n
CONFIG_ZMK_DONGLE_DISPLAY_MODIFIERS=n
