CONFIG_ZMK_KEYBOARD_NAME="Hurna"

CONFIG_ZMK_SLEEP=n
CONFIG_ZMK_POINTING=y

CONFIG_ZMK_BLE=y
CONFIG_ZMK_SPLIT_BLE=y
